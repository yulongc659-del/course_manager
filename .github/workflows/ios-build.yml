name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      - run: flutter pub get

      - name: Setup Widget Target
        run: |
          gem install xcodeproj 2>/dev/null
          ruby ios/setup_widget.rb

      - run: flutter build ios --release --no-codesign

      - name: Build Widget Extension
        run: |
          xcodebuild \
            -project ios/Runner.xcodeproj \
            -target TodayWidget \
            -configuration Release \
            -sdk iphoneos \
            CODE_SIGNING_ALLOWED=NO \
            CONFIGURATION_BUILD_DIR=build/ios/iphoneos \
            build

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          mkdir -p Payload/Runner.app/PlugIns
          cp -r build/ios/iphoneos/TodayWidget.appex Payload/Runner.app/PlugIns/ 2>/dev/null || true
          ditto -c -k --sequesterRsrc --keepParent Payload course_manager.ipa
        shell: bash

      - uses: actions/upload-artifact@v4
        with:
          name: course_manager-ipa
          path: course_manager.ipa
