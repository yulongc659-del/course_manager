name: Build iOS IPA

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.3'
          channel: 'stable'

      - run: flutter pub get
      - run: flutter build ios --release --no-codesign

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload course_manager.ipa

      - uses: actions/upload-artifact@v4
        with:
          name: course_manager-ipa
          path: course_manager.ipa
